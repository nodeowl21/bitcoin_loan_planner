<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Bitcoin Loan Planner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Rising path = leveraged growth / planning -->
  <path
    d="M5 23 L9.5 19 L14 20.5 L18.5 13 L23 15 L27 9"
    fill="none"
    stroke="#ffffff"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />
  <!-- Anchor dot = collateral -->
  <circle cx="5" cy="23" r="2.2" fill="#ffffff"/>
</svg>
